<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Image Cinema Gallery</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <header class="siteHeader">
      <a class="brand" href="./">Shader Gallery</a>
    </header>

    <section class="copyPanel" aria-live="polite">
      <h1 id="copyTitle">Shader Gallery</h1>
      <p id="copyDescription">Images become luminous relief art inside a filmic 3D gallery</p>
      <p id="copyAuthor">Cinematic image stage</p>
    </section>

    <div class="hud">
      <div class="hudMeta">
        <div id="shotLabel" class="shotLabel">Wide Shot</div>
        <div id="artLabel" class="artLabel">Loading images</div>
      </div>
      <div class="hudControls">
        <button id="settingsBtn" class="iconButton settingsBtn" type="button" aria-label="Controls" aria-expanded="false" aria-controls="settingsPanel">&#9881;</button>
        <div id="settingsPanel" class="settingsPanel" aria-hidden="true" inert>
          <label class="selectControl">
            <span>Camera</span>
            <select id="cameraSelect" aria-label="Camera">
              <option value="on">On</option>
              <option value="off">Off</option>
            </select>
          </label>
          <label class="selectControl">
            <span>Gesture</span>
            <select id="viewerSelect" aria-label="Gesture"></select>
          </label>
          <label class="selectControl">
            <span>Display</span>
            <select id="displaySelect" aria-label="Display">
              <option value="crop">Crop</option>
              <option value="full">Full image</option>
            </select>
          </label>
          <label class="selectControl">
            <span>Resolution</span>
            <select id="resolutionSelect" aria-label="Resolution">
              <option value="ultra">Ultra</option>
              <option value="high">High</option>
              <option value="standard">Standard</option>
              <option value="performance">Performance</option>
            </select>
          </label>
          <div class="effectControls" aria-label="Effects">
            <label>
              <span>Dynamics</span>
              <input id="effectDynamics" type="checkbox" checked aria-label="Dynamics" />
            </label>
            <label>
              <span>Displacement</span>
              <input id="effectDisplacement" type="checkbox" checked aria-label="Displacement" />
            </label>
            <label>
              <span>Glow</span>
              <input id="effectGlow" type="checkbox" checked aria-label="Glow" />
            </label>
            <label>
              <span>Reflection</span>
              <input id="effectReflection" type="checkbox" checked aria-label="Reflection" />
            </label>
          </div>
          <div id="cropControls" class="cropControls">
            <label>
              <span>X</span>
              <input id="cropX" type="range" min="0" max="1" step="0.001" aria-label="Crop X" />
            </label>
            <label>
              <span>Y</span>
              <input id="cropY" type="range" min="0" max="1" step="0.001" aria-label="Crop Y" />
            </label>
            <label>
              <span>W</span>
              <input id="cropW" type="range" min="0.05" max="1" step="0.001" aria-label="Crop width" />
            </label>
            <label>
              <span>H</span>
              <input id="cropH" type="range" min="0.05" max="1" step="0.001" aria-label="Crop height" />
            </label>
          </div>
        </div>
      </div>
    </div>

    <div id="filmStrip" class="filmStrip" aria-label="Loaded images"></div>
    <input id="imageInput" class="imageInput" type="file" accept="image/*" multiple />
    <div id="fade" class="fade"></div>
    <div id="dropOverlay" class="dropOverlay">Drop images to add them to the cinema</div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.182.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.182.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="./main.js"></script>
</body>
</html>
